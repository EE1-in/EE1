<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EE1.in - Login</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; }
    header { background:#0e6675; color:white; padding:10px; text-align:left; }
    nav { background:#05505d; padding:10px; text-align:left; }
    nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }
    .container { max-width:400px; margin:50px auto; background:white; padding:30px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    h2 { text-align:center; color:#0e6675; }
    label { display:block; margin:10px 0 5px; color:#333; }
    input { width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; }
    button { width:100%; background:#0e6675; color:white; padding:12px; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
    .switch { text-align:center; margin-top:15px; }
    .switch a { color:#0e6675; text-decoration:none; font-weight:bold; }
    footer { background:#05505d; color:white; text-align:right; padding:15px; margin-top:30px; }
  </style>
</head>
<body>
  <header>
    <h1>EE1.in</h1>
    <p>Empowering and Educating Minds, One Concept at a Time.</p>
  </header>
  <nav>
    <a href="index.html">Home</a>
  </nav>
  <div class="container">
    <h2>Login</h2>
    <form>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
      
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
      
      <button type="submit">Login</button>
    </form>
<div class="switch">
      <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>
  	<footer>
	<div class="text-center xl:text-grey-1 xl:text-[14px] xl:leading-[18px] xl:font-[500] text-[12px] text-black">Copyright © 2026 EEONE Digital
	</div>
 	 </footer>
	</body>
</html>
